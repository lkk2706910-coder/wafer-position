<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Wafer Match Tool v4 - 整合 FI Robot Contact Map</title>
<style>
  body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f5f5f5; margin: 0; display: flex; flex-direction: column; align-items: center; }
  #toolbar { background: white; padding: 12px; width: 100%; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; border-bottom: 2px solid #ddd; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  .ctrl-group { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: bold; }
  select, input { padding: 6px; border-radius: 4px; border: 1px solid #ccc; background: #fff; }
  button { padding: 8px 16px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; transition: all 0.2s; }
  #btn-mgr { background: #FFCA28; color: #333; }
  #btn-mgr:hover { background: #FFB300; }
  #btn-clear-all { background: #F44336; color: white; }
  #btn-clear-all:hover { background: #D32F2F; }
  #btn-undo { background: #9E9E9E; color: white; }
  #btn-undo:hover { background: #757575; }
  #canvas-container { position: relative; margin: 20px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-radius: 8px; overflow: hidden; }
  canvas { display: block; }
  .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); }
  .modal-content { background: white; margin: 30px auto; padding: 25px; border-radius: 12px; width: 90%; max-width: 600px; text-align: center; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
  .close { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #666; }
  .mgr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
  .preview-box { width: 120px; height: 120px; background: #eee; margin: 15px auto; border: 1px solid #666; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 50%; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }
  .preview-box img { width: 104%; height: 104%; object-fit: cover; }
  .mgr-card { border: 2px solid #e0e0e0; padding: 20px 15px 15px; border-radius: 12px; background: #ffffff; cursor: pointer; transition: all 0.2s; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
  .mgr-card.selected { border-color: #2196F3; background: #f8fbff; box-shadow: 0 0 15px rgba(33, 150, 243, 0.2); }
  .mgr-card:focus { outline: none; }
  .mgr-card::after { content: '點擊選取'; position: absolute; top: 8px; right: 12px; font-size: 11px; color: #bbb; background: #f0f0f0; padding: 2px 8px; border-radius: 10px; }
</style>
</head>
<body>
<div id="toolbar">
  <div class="ctrl-group">
    <select id="mode"><option value="FI5.X">FI5.X</option><option value="FI6.4">FI6.4</option></select>
  </div>
  <div class="ctrl-group">
    <label>CASS:</label><select id="cass"><option>A</option><option>B</option><option>C</option><option>D</option></select>
  </div>
  <div class="ctrl-group">
    <label>SIDE:</label><select id="side"><option>S1</option><option>S2</option></select>
  </div>
  <div class="ctrl-group">
    <label>目標:</label><select id="station"><option value="LL">LL</option><option value="CHA">CHA</option><option value="CHB">CHB</option><option value="CHC">CHC</option></select>
  </div>
  <div class="ctrl-group">
    <label>Offset:</label><input type="number" id="offset" value="0" style="width: 55px;">
  </div>
  <button id="btn-mgr" onclick="toggleModal('mgrModal', true)">雙 MAP 管理</button>
  <button id="btn-undo" onclick="undo()">復原</button>
  <button id="btn-clear-all" onclick="clearAllImages()">清除全部貼圖</button>
</div>
<div id="canvas-container">
  <canvas id="mainCanvas"></canvas>
</div>
<div id="zoomModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="toggleModal('zoomModal', false)">&times;</span>
    <h3 id="zoomTitle" style="margin-bottom: 15px;">Node: -- | Source: --</h3>
    <div style="position: relative; width: 500px; height: 500px; margin: 0 auto;">
      <canvas id="zoomCanvas" width="500" height="500" style="background: #fff; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.1);"></canvas>
    </div>
    <p id="zoomInfo" style="font-size: 20px; margin-top: 20px; color: #D32F2F; font-weight: bold;"></p>
  </div>
</div>
<div id="mgrModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="toggleModal('mgrModal', false)">&times;</span>
    <h2>雙 MAP 管理 (S1/S2)</h2>
    <div class="mgr-grid">
      <div class="mgr-card selected" id="card-S1" tabindex="0" onclick="selectSide('S1')">
        <h3>S1 (Left Arm)</h3>
        <div class="preview-box" id="pre-S1">尚未載入</div>
        <button onclick="event.stopPropagation(); document.getElementById('file-S1').click()">上傳</button>
        <button onclick="event.stopPropagation(); pasteToSide('S1')">貼上</button>
        <button onclick="event.stopPropagation(); clearImg('S1')">清除</button>
        <input type="file" id="file-S1" hidden onchange="handleFile(this, 'S1')">
      </div>
      <div class="mgr-card" id="card-S2" tabindex="0" onclick="selectSide('S2')">
        <h3>S2 (Right Arm)</h3>
        <div class="preview-box" id="pre-S2">尚未載入</div>
        <button onclick="event.stopPropagation(); document.getElementById('file-S2').click()">上傳</button>
        <button onclick="event.stopPropagation(); pasteToSide('S2')">貼上</button>
        <button onclick="event.stopPropagation(); clearImg('S2')">清除</button>
        <input type="file" id="file-S2" hidden onchange="handleFile(this, 'S2')">
      </div>
    </div>
  </div>
</div>
<script>
// --- 1. 全域座標與規則配置 ---
const REF_W = 600, REF_H = 850, REF_WAFER_R = 45;

// FI Robot 兩顆晶圓位置（放在 Cooling 兩邊）
// Cooling box: x:250-350, y:490-640, 中心 (300, 565)
// 左右各放一顆 FI wafer，與 Cooling 保持間距
const FI_WAFER_POS = {
  "FI_L": [155, 565],   // Cooling 左側
  "FI_R": [445, 565]    // Cooling 右側
};

const RAW_WAFER_POS = {
  "A2": [245, 105], "A1": [355, 105], "B1": [135, 215], "B2": [135, 325],
  "C2": [465, 215], "C1": [465, 325], "MF1": [245, 325], "MF2": [355, 325],
  "LL1": [200, 435], "LL2": [400, 435], "CS": [300, 565],
  "CA": [150, 720], "CB": [250, 720], "CC": [350, 720], "CD": [450, 720]
};
const RAW_MODULE_BOXES = {
  "CHA": [190, 50, 410, 160], "CHB": [80, 160, 190, 380], "CHC": [410, 160, 520, 380],
  "MF": [190, 160, 410, 380], "LL": [80, 380, 520, 490], "Cooling": [250, 490, 350, 640],
  "CassA": [100, 640, 200, 770], "CassB": [200, 640, 300, 770], "CassC": [300, 640, 400, 770], "CassD": [400, 640, 500, 770]
};
const RAW_LABEL_POS = {
  "CHA": [300, 70], "CHB": [135, 270], "CHC": [465, 270], "MF": [300, 210],
  "LL": [300, 400], "Cooling": [300, 510], "CassA": [150, 650], "CassB": [250, 650], "CassC": [350, 650], "CassD": [450, 650]
};

// --- FI Contact Map 幾何參數（以 REF_WAFER_R = 45 為基準按比例換算） ---
// 原始 SVG: wafer R = 188px 代表 150mm 實際半徑
// 縮放比例: 45 / 188 = 0.2394
// 89mm  -> 45 * (89/150)  = 26.7
// 96mm  -> 45 * (96/150)  = 28.8
// Pad 尺寸（原 SVG 為 30 x 8.8）-> (7.18, 2.10)
const FI_R89 = 26.7;   // 藍色虛線偏移量
const FI_R96 = 28.8;   // 紅色實線偏移量
const FI_PAD_W = 7.2;  // Pad 長度（水平方向）
const FI_PAD_H = 2.2;  // Pad 厚度
// 外部左側兩顆小 pad（原始在外緣 170°/190°、距圓心 190px，略大於 R=188）
// 縮放後距圓心 ≈ 190 * 45/188 = 45.5
const FI_EXT_PAD_R = 45.6;
const FI_EXT_PAD_W = 2.0;    // 原 8px * 0.24
const FI_EXT_PAD_H = 5.3;    // 原 22px * 0.24
// Sensor 小圓（原 r=17，距圓心 205px）
const FI_SENSOR_DIST = 49.0;  // 原 205 * 0.2394
const FI_SENSOR_R = 4.1;      // 原 17 * 0.2394

let waferImages = { S1: null, S2: null };
let historyStack = [];
let selectedSide = 'S1';
let clickableRegions = [];
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

// --- 2. 角度邏輯 ---
function getNodeAngle(mode, nodeName, cassName, side, startAngle) {
  if (["CA", "CB", "CC", "CD"].includes(nodeName)) return (startAngle) % 360;
  let lookupName = (nodeName === "MF1") ? "LL1" : (nodeName === "MF2" ? "LL2" : nodeName);
  let rules = {};
  if (mode === "FI5.X") {
    if (["A", "B"].includes(cassName)) {
      rules = (side === "S1") ? {"LL1": 210, "A1": 30, "B1": 300, "C1": 120, "CS": 0} : {"CS": 300, "LL2": 0, "A2": 180, "B2": 90, "C2": 270};
    } else {
      rules = (side === "S1") ? {"CS": 30, "LL1": 0, "A1": 180, "B1": 90, "C1": 270} : {"LL2": 150, "A2": 330, "B2": 240, "C2": 60, "CS": 0};
    }
  } else {
    if (["A", "B"].includes(cassName)) {
      rules = (side === "S1") ? {"LL1": 195, "A1": 15, "B1": 285, "C1": 105, "CS": 0} : {"CS": 255, "LL2": 345, "A2": 165, "B2": 75, "C2": 255};
    } else {
      rules = (side === "S1") ? {"CS": 105, "LL1": 15, "A1": 195, "B1": 105, "C1": 285} : {"LL2": 165, "A2": 345, "B2": 255, "C2": 75, "CS": 0};
    }
  }
  return ( (rules[lookupName] || 0) + startAngle ) % 360;
}

function getFullPath(cassName, side, station) {
  let path = [`C${cassName}`];
  if ((["A", "B"].includes(cassName) && side === "S2") || (["C", "D"].includes(cassName) && side === "S1")) path.push("CS");
  path.push(side === "S1" ? "LL1" : "LL2");
  if (station !== "LL") {
    path.push(side === "S1" ? "MF1" : "MF2");
    let target = {"CHA":"A", "CHB":"B", "CHC":"C"}[station];
    path.push(`${target}${side === "S1" ? '1' : '2'}`);
  }
  return path;
}

// --- 3. 繪圖核心 ---
function draw() {
  canvas.width = REF_W; canvas.height = REF_H;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  clickableRegions = [];

  const mode = document.getElementById('mode').value,
        selC = document.getElementById('cass').value,
        selS = document.getElementById('side').value,
        selSt = document.getElementById('station').value,
        baseAngle = parseInt(document.getElementById('offset').value) || 0;

  const pathS1 = getFullPath(selC, "S1", selSt),
        pathS2 = getFullPath(selC, "S2", selSt);

  // 模組方框與標籤
  ctx.strokeStyle = "#0015D1"; ctx.lineWidth = 1.5; ctx.fillStyle = "#5C6BC0";
  ctx.font = "bold 13px Segoe UI"; ctx.textAlign = "center";
  for (let name in RAW_MODULE_BOXES) {
    let b = RAW_MODULE_BOXES[name];
    ctx.strokeRect(b[0], b[1], b[2]-b[0], b[3]-b[1]);
    let lp = RAW_LABEL_POS[name] || [(b[0]+b[2])/2, b[1]+18];
    ctx.fillText(name, lp[0], lp[1]);
  }

  // 路徑上的晶圓節點
  for (let name in RAW_WAFER_POS) {
    let [cx, cy] = RAW_WAFER_POS[name];
    let showS1 = pathS1.includes(name) && (waferImages.S1 || selS === "S1"),
        showS2 = pathS2.includes(name) && (waferImages.S2 || selS === "S2");
    let sideToDraw = (showS1 && showS2) ? selS : (showS1 ? "S1" : (showS2 ? "S2" : null)),
        isInPath = sideToDraw !== null;
    let angle = getNodeAngle(mode, name, selC, sideToDraw || selS, baseAngle),
        displayAngle = (180 + angle) % 360;

    ctx.beginPath(); ctx.arc(cx, cy, REF_WAFER_R, 0, Math.PI * 2);
    ctx.fillStyle = isInPath ? "white" : "#F0F4F7"; ctx.fill();
    ctx.strokeStyle = "#BDC3C7"; ctx.lineWidth = 1; ctx.stroke();

    if (isInPath && waferImages[sideToDraw]) {
      drawClippedWafer(ctx, waferImages[sideToDraw], cx, cy, REF_WAFER_R, displayAngle);
    } else {
      ctx.fillStyle = isInPath ? "#2C3E50" : "#BDC3C7";
      ctx.font = "11px Segoe UI";
      ctx.fillText(name, cx, cy + 4);
    }

    // --- Notch 指示器繪製（原版 inline 寫法，完全不動）---
    let notchRad = ( (90 + displayAngle) * Math.PI ) / 180;
    let ex = cx + REF_WAFER_R * Math.cos(notchRad);
    let ey = cy + REF_WAFER_R * Math.sin(notchRad);
    let p1x = cx + (REF_WAFER_R - 9) * Math.cos(notchRad);
    let p1y = cy + (REF_WAFER_R - 9) * Math.sin(notchRad);
    ctx.beginPath();
    ctx.moveTo(p1x, p1y);
    ctx.lineTo(ex + 4 * Math.sin(notchRad), ey - 4 * Math.cos(notchRad));
    ctx.lineTo(ex - 4 * Math.sin(notchRad), ey + 4 * Math.cos(notchRad));
    ctx.closePath();
    ctx.fillStyle = "#F44336"; ctx.fill();

    if (isInPath) {
      ctx.beginPath(); ctx.arc(cx, cy, REF_WAFER_R + 1.5, 0, Math.PI * 2);
      ctx.strokeStyle = "#D32F2F"; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = "#D32F2F"; ctx.font = "bold 13px Segoe UI";
      ctx.fillText(`${angle}°`, cx, cy - REF_WAFER_R - 10);
    }
    clickableRegions.push({ name, cx, cy, angle, side: sideToDraw || selS, isFI: false });
  }

  // --- FI Robot 兩顆晶圓（Cooling 兩側）---
  // 這兩顆在任何路徑下都會顯示，方便使用者隨時比對 contact 角度
  for (let fiName in FI_WAFER_POS) {
    let [cx, cy] = FI_WAFER_POS[fiName];
    // FI wafer 對應的手臂：左側=S1, 右側=S2
    let fiSide = (fiName === "FI_L") ? "S1" : "S2";
    let hasImg = waferImages[fiSide] !== null;
    // FI 節點的 notch 預設放在 6 點鐘（圓心下方）
    // notch 公式: notchRad = (90 + displayAngle)° → 要 notch 在 6 點鐘需 displayAngle = 0
    // displayAngle = (180 + angle) % 360 → 所以 angle = 180 時 notch 在 6 點鐘
    // offset 變化時疊加：angle = (180 + baseAngle) % 360
    let angle = (180 + baseAngle) % 360;
    let displayAngle = (180 + angle) % 360;

    // 背景圓
    ctx.beginPath(); ctx.arc(cx, cy, REF_WAFER_R, 0, Math.PI * 2);
    ctx.fillStyle = hasImg ? "white" : "#F0F4F7"; ctx.fill();
    ctx.strokeStyle = "#BDC3C7"; ctx.lineWidth = 1; ctx.stroke();

    // Wafer map（若有）
    if (hasImg) {
      drawClippedWafer(ctx, waferImages[fiSide], cx, cy, REF_WAFER_R, displayAngle);
    } else {
      ctx.fillStyle = "#546E7A";
      ctx.font = "bold 11px Segoe UI";
      ctx.fillText(`FI ${fiSide}`, cx, cy + 4);
    }

    // FI Contact Layout 疊在 wafer map 之上（不隨 offset 旋轉）
    drawFIContactOverlay(ctx, cx, cy, REF_WAFER_R);

    // Notch 指示器（跟著 wafer map 旋轉，隨 offset 變化）
    drawNotch(ctx, cx, cy, REF_WAFER_R, displayAngle);

    // 角度顯示
    ctx.beginPath(); ctx.arc(cx, cy, REF_WAFER_R + 1.5, 0, Math.PI * 2);
    ctx.strokeStyle = "#1976D2"; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = "#1976D2"; ctx.font = "bold 13px Segoe UI";
    ctx.fillText(`FI ${fiSide}  ${angle}°`, cx, cy - REF_WAFER_R - 10);

    clickableRegions.push({ name: `FI_${fiSide}`, cx, cy, angle, side: fiSide, isFI: true });
  }
}

// Notch 三角指示器
function drawNotch(ctx, cx, cy, r, displayAngle) {
  let notchRad = ( (90 + displayAngle) * Math.PI ) / 180;
  let ex = cx + r * Math.cos(notchRad);
  let ey = cy + r * Math.sin(notchRad);
  let p1x = cx + (r - 9) * Math.cos(notchRad);
  let p1y = cy + (r - 9) * Math.sin(notchRad);
  ctx.beginPath();
  ctx.moveTo(p1x, p1y);
  ctx.lineTo(ex + 4 * Math.sin(notchRad), ey - 4 * Math.cos(notchRad));
  ctx.lineTo(ex - 4 * Math.sin(notchRad), ey + 4 * Math.cos(notchRad));
  ctx.closePath();
  ctx.fillStyle = "#F44336"; ctx.fill();
}

// --- FI Contact Overlay（固定方位，不隨 offset 變化）---
// 姿態 = 原 FI contact map（圖1）：
//   - 中心線 = 垂直（12點→6點）
//   - 89mm 藍虛線 / 96mm 紅實線 = 左右各一條，垂直
//   - Pad 在紅線 96mm 的外側，左右對稱，上下各一，共 4 顆
//   - Sensor 在下方外部
//   - 外部 2 顆小 pad 也在下方兩側
//   - 89mm / 96mm 文字標註在中心附近
function drawFIContactOverlay(ctx, cx, cy, r) {
  ctx.save();

  // ─── 中心垂直線 ───
  ctx.beginPath();
  ctx.moveTo(cx, cy - r);
  ctx.lineTo(cx, cy + r);
  ctx.strokeStyle = "#1144cc"; ctx.lineWidth = 1.2;
  ctx.stroke();

  // ─── 89mm 藍虛線（左右各一，垂直）───
  let halfH89 = Math.sqrt(Math.max(0, r*r - FI_R89*FI_R89));
  ctx.setLineDash([4, 2.5]);
  ctx.strokeStyle = "#1144cc"; ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(cx - FI_R89, cy - halfH89); ctx.lineTo(cx - FI_R89, cy + halfH89);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + FI_R89, cy - halfH89); ctx.lineTo(cx + FI_R89, cy + halfH89);
  ctx.stroke();

  // ─── 96mm 紅實線（左右各一，垂直）───
  let halfH96 = Math.sqrt(Math.max(0, r*r - FI_R96*FI_R96));
  ctx.setLineDash([]);
  ctx.strokeStyle = "#cc2222"; ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(cx - FI_R96, cy - halfH96); ctx.lineTo(cx - FI_R96, cy + halfH96);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + FI_R96, cy - halfH96); ctx.lineTo(cx + FI_R96, cy + halfH96);
  ctx.stroke();

  // ─── Pad：夾在 89mm 藍虛線與 96mm 紅實線「之間」、上方左右各一顆（共 2 顆）───
  // 厚度方向（沿半徑）= 紅藍線距 = 2.1px，位於 x = cx ± FI_R89（藍線外側）到 cx ± FI_R96（紅線內側）
  // 長度方向（沿切線/y 方向）距中心水平線 28.2~35.4（上方）
  const PAD_THICK = FI_R96 - FI_R89;      // 2.1
  const PAD_NEAR  = 118 * r / 188;        // 28.2
  const PAD_FAR   = 148 * r / 188;        // 35.4
  const PAD_LEN   = PAD_FAR - PAD_NEAR;   // 7.2

  ctx.fillStyle = "#b0b8d8";
  ctx.strokeStyle = "#6677aa"; ctx.lineWidth = 0.6;
  // 右上 pad（夾在 cx+FI_R89 與 cx+FI_R96 之間）
  ctx.fillRect(cx + FI_R89, cy - PAD_FAR, PAD_THICK, PAD_LEN);
  ctx.strokeRect(cx + FI_R89, cy - PAD_FAR, PAD_THICK, PAD_LEN);
  // 左上 pad（夾在 cx-FI_R96 與 cx-FI_R89 之間）
  ctx.fillRect(cx - FI_R96, cy - PAD_FAR, PAD_THICK, PAD_LEN);
  ctx.strokeRect(cx - FI_R96, cy - PAD_FAR, PAD_THICK, PAD_LEN);

  // ─── 89mm / 96mm 標註文字（中心右側，小字型）───
  ctx.font = "bold 6px 'Segoe UI', sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillStyle = "#1144cc";
  ctx.fillText("89mm", cx - FI_R89/2, cy - 3);
  ctx.fillStyle = "#cc2222";
  ctx.fillText("96mm", cx + FI_R89/2, cy + 3);

  // ─── Sensor 小圓（下方外部，無綠色箭頭）───
  ctx.beginPath();
  ctx.arc(cx, cy + FI_SENSOR_DIST, FI_SENSOR_R, 0, Math.PI * 2);
  ctx.strokeStyle = "#1144cc"; ctx.lineWidth = 1.0;
  ctx.fillStyle = "#ffffff";
  ctx.fill(); ctx.stroke();

  // ─── 下方外部兩顆小 Pad（80°/100°）───
  ctx.fillStyle = "#b0b8d8";
  ctx.strokeStyle = "#6677aa"; ctx.lineWidth = 0.5;
  [80, 100].forEach(deg => {
    let a = deg * Math.PI / 180;
    let ex = cx + FI_EXT_PAD_R * Math.cos(a);
    let ey = cy + FI_EXT_PAD_R * Math.sin(a);
    ctx.save();
    ctx.translate(ex, ey);
    ctx.rotate(a);
    ctx.fillRect(-FI_EXT_PAD_W/2, -FI_EXT_PAD_H/2, FI_EXT_PAD_W, FI_EXT_PAD_H);
    ctx.strokeRect(-FI_EXT_PAD_W/2, -FI_EXT_PAD_H/2, FI_EXT_PAD_W, FI_EXT_PAD_H);
    ctx.restore();
  });

  ctx.restore();
}

function drawClippedWafer(targetCtx, img, cx, cy, r, rotAngle) {
  targetCtx.save();
  targetCtx.beginPath();
  targetCtx.arc(cx, cy, r, 0, Math.PI * 2);
  targetCtx.clip();
  targetCtx.translate(cx, cy);
  targetCtx.rotate(rotAngle * Math.PI / 180);
  let minDim = Math.min(img.width, img.height);
  let cropSize = minDim * 1.01;
  targetCtx.drawImage(img, (img.width - cropSize) / 2, (img.height - cropSize) / 2, cropSize, cropSize, -r, -r, r * 2, r * 2);
  targetCtx.restore();
}

// --- 4. 放大視窗 ---
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (REF_W / rect.width),
        y = (e.clientY - rect.top) * (REF_H / rect.height);
  clickableRegions.forEach(reg => {
    if (Math.sqrt((x - reg.cx)**2 + (y - reg.cy)**2) < REF_WAFER_R) showZoom(reg);
  });
});

function showZoom(reg) {
  const zCvs = document.getElementById('zoomCanvas'),
        zCtx = zCvs.getContext('2d'),
        img = waferImages[reg.side];
  zCtx.clearRect(0, 0, 500, 500);
  let cx = 250, cy = 250;
  let wafer_zoom_r = 210;
  let angle = reg.angle;
  let displayAngleForZoom = (180 + angle) % 360;

  // FI 節點放大時不做視角旋轉（維持標線水平 / pad 在上的固定姿態）
  if (!reg.isFI) {
    let viewRotation = 0;
    if (["A1", "A2"].includes(reg.name)) viewRotation = 180;
    else if (["B1", "B2"].includes(reg.name)) viewRotation = -90;
    else if (["C1", "C2"].includes(reg.name)) viewRotation = 90;
    displayAngleForZoom = (displayAngleForZoom + viewRotation + 360) % 360;
  }

  zCtx.beginPath();
  zCtx.arc(cx, cy, wafer_zoom_r, 0, Math.PI * 2);
  zCtx.fillStyle = "#fff"; zCtx.fill();
  if (img) drawClippedWafer(zCtx, img, cx, cy, wafer_zoom_r, displayAngleForZoom);
  zCtx.beginPath(); zCtx.arc(cx, cy, wafer_zoom_r, 0, Math.PI * 2);
  zCtx.lineWidth = 1; zCtx.strokeStyle = "black"; zCtx.stroke();

  // FI 節點在放大視窗疊上等比放大的 contact overlay
  if (reg.isFI) {
    drawFIContactOverlayScaled(zCtx, cx, cy, wafer_zoom_r);
    // Notch 指示器（跟著 wafer 旋轉）
    drawNotchScaled(zCtx, cx, cy, wafer_zoom_r, displayAngleForZoom);
  } else {
    // 一般節點的 Slit Valve 顯示
    const sv_config = {
      "A1": { x: cx, y: 15, rot: 0 }, "A2": { x: cx, y: 15, rot: 0 },
      "B1": { x: cx, y: 15, rot: 0 }, "B2": { x: cx, y: 15, rot: 0 },
      "C1": { x: cx, y: 15, rot: 0 }, "C2": { x: cx, y: 15, rot: 0 },
      "LL1": { x: cx, y: 15, rot: 0 }, "LL2": { x: cx, y: 15, rot: 0 }
    };
    if (sv_config[reg.name]) {
      let cfg = sv_config[reg.name];
      zCtx.save();
      zCtx.translate(cfg.x, cfg.y); zCtx.rotate(cfg.rot * Math.PI / 180);
      let barW = 300, barH = 40;
      zCtx.fillStyle = "#4AA3FF"; zCtx.fillRect(-barW/2, -barH/2, barW, barH);
      zCtx.textAlign = "center"; zCtx.textBaseline = "middle";
      zCtx.fillStyle = "white"; zCtx.font = "bold 16px Arial";
      zCtx.fillText("SLIT VALVE", 0, -7);
      zCtx.fillStyle = "black"; zCtx.font = "bold 13px Arial";
      zCtx.fillText(`Station: ${reg.name} | Rotation: ${reg.angle}°`, 0, 9);
      zCtx.restore();
    }

    // ─── LL1 接觸點（5 個無填滿圓形，固定在晶圓邊緣）───
    if (reg.name === "LL1") {
      const contactAngles = [250, 285, 320, 70, 140];
      const contactR = 8;
      zCtx.save();
      zCtx.strokeStyle = "#333";
      zCtx.lineWidth = 2;
      zCtx.setLineDash([]);
      contactAngles.forEach(deg => {
        let rad = (deg - 90) * Math.PI / 180;
        let px = cx + wafer_zoom_r * Math.cos(rad);
        let py = cy + wafer_zoom_r * Math.sin(rad);
        zCtx.beginPath();
        zCtx.arc(px, py, contactR, 0, Math.PI * 2);
        zCtx.fillStyle = "rgba(255,255,255,0)";
        zCtx.stroke();
      });
      zCtx.restore();
    }

    // ─── LL2 接觸點（5 個無填滿圓形，固定在晶圓邊緣）───
    if (reg.name === "LL2") {
      const contactAngles = [215, 285, 35, 70, 105];
      const contactR = 8;
      zCtx.save();
      zCtx.strokeStyle = "#333";
      zCtx.lineWidth = 2;
      zCtx.setLineDash([]);
      contactAngles.forEach(deg => {
        let rad = (deg - 90) * Math.PI / 180;
        let px = cx + wafer_zoom_r * Math.cos(rad);
        let py = cy + wafer_zoom_r * Math.sin(rad);
        zCtx.beginPath();
        zCtx.arc(px, py, contactR, 0, Math.PI * 2);
        zCtx.fillStyle = "rgba(255,255,255,0)";
        zCtx.stroke();
      });
      zCtx.restore();
    }
  }

  document.getElementById('zoomTitle').innerText = `Node: ${reg.name} | Source: ${reg.side}`;
  document.getElementById('zoomInfo').innerText = `Robot Angle: ${reg.angle}°`;
  toggleModal('zoomModal', true);
}

// 放大版的 FI overlay（等比放大，姿態與主畫面一致）
function drawFIContactOverlayScaled(ctx, cx, cy, r) {
  const k = r / REF_WAFER_R;
  const R89 = FI_R89 * k;
  const R96 = FI_R96 * k;
  const SENSOR_DIST = FI_SENSOR_DIST * k;
  const SENSOR_R = FI_SENSOR_R * k;
  const EXT_PAD_R = FI_EXT_PAD_R * k;
  const EXT_PAD_W = FI_EXT_PAD_W * k;
  const EXT_PAD_H = FI_EXT_PAD_H * k;
  const PAD_THICK = R96 - R89;
  const PAD_NEAR  = 118 * r / 188;
  const PAD_FAR   = 148 * r / 188;
  const PAD_LEN   = PAD_FAR - PAD_NEAR;

  ctx.save();

  // 中心垂直線
  ctx.beginPath();
  ctx.moveTo(cx, cy - r); ctx.lineTo(cx, cy + r);
  ctx.strokeStyle = "#1144cc"; ctx.lineWidth = 2; ctx.stroke();

  // 89mm 藍虛線（左右各一，垂直）
  let halfH89 = Math.sqrt(Math.max(0, r*r - R89*R89));
  ctx.setLineDash([8, 5]); ctx.lineWidth = 2;
  ctx.strokeStyle = "#1144cc";
  ctx.beginPath(); ctx.moveTo(cx - R89, cy - halfH89); ctx.lineTo(cx - R89, cy + halfH89); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + R89, cy - halfH89); ctx.lineTo(cx + R89, cy + halfH89); ctx.stroke();

  // 96mm 紅實線（左右各一，垂直）
  let halfH96 = Math.sqrt(Math.max(0, r*r - R96*R96));
  ctx.setLineDash([]); ctx.strokeStyle = "#cc2222";
  ctx.beginPath(); ctx.moveTo(cx - R96, cy - halfH96); ctx.lineTo(cx - R96, cy + halfH96); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + R96, cy - halfH96); ctx.lineTo(cx + R96, cy + halfH96); ctx.stroke();

  // Pad：夾在紅藍線之間，只有上方左右各一顆（共 2 顆）
  ctx.fillStyle = "#b0b8d8"; ctx.strokeStyle = "#6677aa"; ctx.lineWidth = 1;
  // 右上 pad
  ctx.fillRect(cx + R89, cy - PAD_FAR, PAD_THICK, PAD_LEN);
  ctx.strokeRect(cx + R89, cy - PAD_FAR, PAD_THICK, PAD_LEN);
  // 左上 pad
  ctx.fillRect(cx - R96, cy - PAD_FAR, PAD_THICK, PAD_LEN);
  ctx.strokeRect(cx - R96, cy - PAD_FAR, PAD_THICK, PAD_LEN);

  // 89mm / 96mm 標註文字（中心附近，參考原圖位置）
  ctx.font = "bold 14px 'Segoe UI', sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillStyle = "#1144cc";
  ctx.fillText("89mm", cx - R89/2, cy - 10);
  ctx.fillStyle = "#cc2222";
  ctx.fillText("96mm", cx + R89/2, cy + 10);

  // Sensor 小圓（下方外部，無綠色箭頭）
  ctx.beginPath();
  ctx.arc(cx, cy + SENSOR_DIST, SENSOR_R, 0, Math.PI * 2);
  ctx.strokeStyle = "#1144cc"; ctx.lineWidth = 1.5;
  ctx.fillStyle = "#ffffff"; ctx.fill(); ctx.stroke();

  // 下方外部兩顆小 Pad（80° / 100°）
  ctx.fillStyle = "#b0b8d8"; ctx.strokeStyle = "#6677aa"; ctx.lineWidth = 1;
  [80, 100].forEach(deg => {
    let a = deg * Math.PI / 180;
    let ex = cx + EXT_PAD_R * Math.cos(a);
    let ey = cy + EXT_PAD_R * Math.sin(a);
    ctx.save();
    ctx.translate(ex, ey); ctx.rotate(a);
    ctx.fillRect(-EXT_PAD_W/2, -EXT_PAD_H/2, EXT_PAD_W, EXT_PAD_H);
    ctx.strokeRect(-EXT_PAD_W/2, -EXT_PAD_H/2, EXT_PAD_W, EXT_PAD_H);
    ctx.restore();
  });

  ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
  ctx.restore();
}

function drawNotchScaled(ctx, cx, cy, r, displayAngle) {
  let notchRad = ( (90 + displayAngle) * Math.PI ) / 180;
  let ex = cx + r * Math.cos(notchRad);
  let ey = cy + r * Math.sin(notchRad);
  let p1x = cx + (r - 36) * Math.cos(notchRad);
  let p1y = cy + (r - 36) * Math.sin(notchRad);
  ctx.beginPath();
  ctx.moveTo(p1x, p1y);
  ctx.lineTo(ex + 16 * Math.sin(notchRad), ey - 16 * Math.cos(notchRad));
  ctx.lineTo(ex - 16 * Math.sin(notchRad), ey + 16 * Math.cos(notchRad));
  ctx.closePath();
  ctx.fillStyle = "#F44336"; ctx.fill();
}

// --- 5. 圖片管理與歷史復原 ---
function saveState() {
  historyStack.push({ S1: waferImages.S1, S2: waferImages.S2 });
  if (historyStack.length > 20) historyStack.shift();
}
function undo() {
  if (historyStack.length > 0) {
    let prevState = historyStack.pop();
    waferImages.S1 = prevState.S1; waferImages.S2 = prevState.S2;
    updateMgrPreview('S1'); updateMgrPreview('S2'); draw();
  } else { alert("目前沒有可以復原的步驟！"); }
}
function clearAllImages() {
  saveState();
  waferImages.S1 = null; waferImages.S2 = null;
  updateMgrPreview('S1'); updateMgrPreview('S2'); draw();
}
function toggleModal(id, s) { document.getElementById(id).style.display = s ? 'block' : 'none'; }
function handleFile(i, s) { if (i.files[0]) { let r = new FileReader(); r.onload=(e)=>loadImgToSide(e.target.result,s); r.readAsDataURL(i.files[0]); } }
function loadImgToSide(d, s) {
  saveState();
  let i = new Image(); i.onload=()=>{ waferImages[s]=i; updateMgrPreview(s); draw(); }; i.src=d;
}
function updateMgrPreview(s) {
  document.getElementById(`pre-${s}`).innerHTML = waferImages[s] ? `<img src="${waferImages[s].src}">` : "尚未載入";
}
function selectSide(s) {
  selectedSide = s;
  document.getElementById('card-S1').classList.toggle('selected', s === 'S1');
  document.getElementById('card-S2').classList.toggle('selected', s === 'S2');
}
function clearImg(s) { saveState(); waferImages[s]=null; updateMgrPreview(s); draw(); }
async function pasteToSide(s) {
  try {
    const items = await navigator.clipboard.read();
    for (const item of items) {
      if (item.types.includes('image/png') || item.types.includes('image/jpeg')) {
        const blob = await item.getType(item.types.find(t=>t.startsWith('image/')));
        const r = new FileReader(); r.onload=(e)=>loadImgToSide(e.target.result,s); r.readAsDataURL(blob);
      }
    }
  } catch(err) {
    console.warn("Clipboard API failed, fallback to native paste event.");
    alert("瀏覽器權限受限，請直接點擊藍框框後按 Ctrl+V 貼上即可。");
  }
}
window.addEventListener('paste', (e) => {
  const isModalOpen = document.getElementById('mgrModal').style.display === 'block';
  const s = isModalOpen ? selectedSide : document.getElementById('side').value;
  const items = (e.clipboardData || e.originalEvent.clipboardData).items;
  for (const item of items) {
    if (item.kind === 'file' && item.type.startsWith('image/')) {
      let r = new FileReader(); r.onload=(ev)=>loadImgToSide(ev.target.result,s); r.readAsDataURL(item.getAsFile()); break;
    }
  }
});
['mode', 'cass', 'side', 'station', 'offset'].forEach(id => {
  document.getElementById(id).addEventListener('change', draw);
  document.getElementById(id).addEventListener('input', draw);
});
window.onload = draw;
</script>
