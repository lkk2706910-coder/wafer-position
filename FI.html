<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FI Robot TYPE 2 — Wafer Edge Contact Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f2ee;
    --panel: #ffffff;
    --text: #1a1a1a;
    --sub: #666;
    --border: #d0ccc4;
  }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .layout {
    display: flex;
    gap: 0;
    align-items: flex-start;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 40px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  .section-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    margin-bottom: 16px;
    color: var(--text);
  }

  .diagram-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .diagram-panel svg { display: block; }
</style>
</head>
<body>

<div class="layout" style="position:relative;">
  <div class="diagram-panel">
    <div class="section-title">FI Robot contact map</div>

    <svg width="450" height="460" viewBox="0 0 430 460" xmlns="http://www.w3.org/2000/svg">

      <defs>
        <marker id="arrB_tip" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
          <polygon points="0 0, 8 4, 0 8" fill="#1144cc"/>
        </marker>
        <marker id="arrB_tail" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto-start-reverse">
          <polygon points="0 0, 8 4, 0 8" fill="#1144cc"/>
        </marker>
        <marker id="arrR_tip" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
          <polygon points="0 0, 8 4, 0 8" fill="#cc2222"/>
        </marker>
        <marker id="arrR_tail" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto-start-reverse">
          <polygon points="0 0, 8 4, 0 8" fill="#cc2222"/>
        </marker>
      </defs>

      <!-- 整體逆時針旋轉90度，圍繞圓心(218,258) -->
      <g transform="translate(0,-30) rotate(-90, 218, 258)">

        <!-- BLOCK 1 ▌晶圓外框圓 cx=218, cy=258, r=188 -->
        <circle cx="218" cy="258" r="188"
                fill="none" stroke="#1144cc" stroke-width="1.8"/>

        <!-- BLOCK 2 ▌中心水平線 9點鐘(x=30)→3點鐘(x=406), y=258 -->
        <line x1="30" y1="258" x2="406" y2="258"
              stroke="#1144cc" stroke-width="1.5"/>

        <!-- BLOCK 3 ▌藍色虛線 −89mm（上方）y=146.5 -->
        <line x1="66.7" y1="146.5" x2="369.3" y2="146.5"
              stroke="#1144cc" stroke-width="1.5" stroke-dasharray="8,5"/>

        <!-- BLOCK 4 ▌藍色虛線 +89mm（下方）y=369.5 -->
        <line x1="66.7" y1="369.5" x2="369.3" y2="369.5"
              stroke="#1144cc" stroke-width="1.5" stroke-dasharray="8,5"/>

        <!-- BLOCK 5 ▌紅色實線 −96mm（上方）y=137.7 -->
        <line x1="73.5" y1="137.7" x2="362.5" y2="137.7"
              stroke="#cc2222" stroke-width="1.5"/>

        <!-- BLOCK 6 ▌紅色實線 +96mm（下方）y=378.3 -->
        <line x1="73.5" y1="378.3" x2="362.5" y2="378.3"
              stroke="#cc2222" stroke-width="1.5"/>

        <!-- BLOCK 7 ▌上方接觸墊 Upper Pad（右側）-->
        <rect x="336" y="137.7" width="30" height="8.8" rx="2"
              fill="#b0b8d8" opacity="1"/>

        <!-- BLOCK 8 ▌下方接觸墊 Lower Pad（右側）-->
        <rect x="336" y="369.5" width="30" height="8.8" rx="2"
              fill="#b0b8d8" opacity="1"/>

        <!-- BLOCK 9 ▌綠色三角箭頭 圓內9點鐘，朝右指向圓心 -->
        <polygon points="44,258 30,251 30,265"
                 fill="#22aa44" stroke="none"/>

        <!-- BLOCK 10 ▌左側外部 Pad 170度 -->
        <rect x="-4" y="-11" width="8" height="22" rx="3"
              fill="#b0b8d8" stroke="#7799cc" stroke-width="1"
              transform="translate(28.92,291.34) rotate(170)"/>

        <!-- BLOCK 11 ▌左側外部 Pad 190度 -->
        <rect x="-4" y="-11" width="8" height="22" rx="3"
              fill="#b0b8d8" stroke="#7799cc" stroke-width="1"
              transform="translate(28.92,224.66) rotate(190)"/>

        <!-- BLOCK 12 ▌小圓 Sensor cx=13, cy=258, r=17 -->
        <circle cx="13" cy="258" r="17"
                fill="none" stroke="#1144cc" stroke-width="1.5"/>

        <!-- BLOCK 13 ▌89mm 藍色虛線雙箭頭 -->
        <line x1="218" y1="254" x2="218" y2="150"
              stroke="#1144cc" stroke-width="1.3" stroke-dasharray="6,4"
              marker-start="url(#arrB_tail)" marker-end="url(#arrB_tip)"/>
        <!-- 文字反向旋轉保持可讀 -->
        <text transform="rotate(90, 224, 206)" x="224" y="206" fill="#1144cc"
              font-family="'IBM Plex Mono',monospace" font-size="12">89mm</text>

        <!-- BLOCK 14 ▌96mm 紅色虛線雙箭頭 -->
        <line x1="218" y1="262" x2="218" y2="374"
              stroke="#cc2222" stroke-width="1.3" stroke-dasharray="6,4"
              marker-start="url(#arrR_tail)" marker-end="url(#arrR_tip)"/>
        <text transform="rotate(90, 224, 324)" x="224" y="324" fill="#cc2222"
              font-family="'IBM Plex Mono',monospace" font-size="12">96mm</text>

      </g>

    </svg>
  </div>
</div>

<p style="margin-top:20px; font-family:'IBM Plex Mono',monospace; font-size:10px; color:#aaa; letter-spacing:0.1em;">
  FI ROBOT TYPE 2 · WAFER EDGE CONTACT MAP · LAYOUT REFERENCE
</p>

</body>
</html>
